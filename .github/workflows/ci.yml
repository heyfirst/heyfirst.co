name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check

      - name: Lint code
        run: bun run lint

      - name: Check formatting
        run: bun run format:code --check

      - name: Build project
        run: bun run build

      - name: Check for dead links
        run: |
          npx broken-link-checker http://localhost:4321 --recursive --exclude-external --exclude-private || true
        if: always()
